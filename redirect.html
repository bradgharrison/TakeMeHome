<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8">
  <meta name="google-site-verification" content="mGjv-5FpvQIN3J2Vi9boxVGCyYHEzUb5e4IeI6BaCAg" />
  <title>Redirecting...</title>
  <style>
    :root {
      --background-color: #f5f5f5;
      --spinner-background: rgba(66, 133, 244, 0.2);
      --spinner-foreground: #4285f4;
      --text-color: #666;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background-color: #222;
        --spinner-background: rgba(66, 133, 244, 0.1);
        --spinner-foreground: #5c9bff;
        --text-color: #aaa;
      }
    }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: var(--background-color);
      transition: background-color 0.3s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--spinner-background);
      border-top: 4px solid var(--spinner-foreground);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .hint {
      color: var(--text-color);
      font-size: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
      margin-top: 20px;
      max-width: 300px;
      line-height: 1.4;
    }

    .hint.visible {
      opacity: 1;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="module" src="js/redirect.js"></script>
</head>

<body>
  <div class="spinner"></div>
  <div id="hint" class="hint">Having trouble? Check if the URL is correct in the extension settings.</div>
</body>

</html>
