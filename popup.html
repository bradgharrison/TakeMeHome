<!DOCTYPE html>
<!--
    TakeMeHome Extension - Popup HTML
    Version: 0.1
    Last updated: 2024-03-28 14:00
-->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeMeHome Options</title>
  <style>
    :root {
      --background-color: #ffffff;
      --text-color: #333333;
      --input-background: #ffffff;
      --input-text: #333333;
      --input-border: #ccc;
      --button-background: #4285f4;
      --button-text: white;
      --button-hover: #3367d6;
      --success-color: #4caf50;
      --error-color: #f44336;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background-color: #292a2d;
        --text-color: #e8eaed;
        --input-background: #202124;
        --input-text: #e8eaed;
        --input-border: #5f6368;
        --button-background: #5c9bff;
        --button-text: #202124;
        --button-hover: #7ba9ff;
        --success-color: #81c995;
        --error-color: #f28b82;
      }
    }

    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      width: 300px;
      margin: 0;
      background-color: var(--background-color);
      color: var(--text-color);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 10px 0;
      color: #2c3e50;
    }

    label {
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }

    input[type="text"] {
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: var(--input-background);
      color: var(--input-text);
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-end;
    }

    button:hover {
      background-color: #2980b9;
    }

    #status {
      color: #27ae60;
      font-weight: bold;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #status.visible {
      opacity: 1;
    }

    #status.error {
      color: #e74c3c;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>TakeMeHome Settings</h1>

    <div>
      <label for="homepage">Home URL:</label>
      <input type="text" id="homepage" placeholder="https://example.com" />
    </div>

    <button id="save">Save</button>

    <div id="status"></div>
  </div>

  <script type="module" src="js/popup.js"></script>
</body>

</html>
